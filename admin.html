<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Del Barrio — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 36px; height: 36px;
      background: #2a9d8f;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-circle {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-pin { width: 6px; height: 6px; border-radius: 50%; background: #fff; }
    header h1 { font-size: 18px; font-weight: 700; }
    header span { font-size: 13px; color: #aaa; margin-left: 4px; }

    .stats {
      display: flex;
      gap: 16px;
      padding: 24px;
      flex-wrap: wrap;
    }
    .stat {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      flex: 1;
      min-width: 130px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-num { font-size: 30px; font-weight: 800; color: #1a1a2e; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

    .controles {
      padding: 0 24px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #888;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      transition: all 0.15s;
    }
    .tab.activo { background: #1a1a2e; color: #fff; }

    .tabla-wrap { padding: 0 24px 40px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); min-width: 900px; }
    th { background: #f8f8f8; padding: 14px 16px; text-align: left; font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 12px 16px; font-size: 13px; color: #333; border-top: 1px solid #f0f0f0; vertical-align: middle; }
    tr:hover td { background: #fafafa; }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-activo { background: #d0f0ec; color: #2a9d8f; }
    .badge-inactivo { background: #f0f0f0; color: #888; }
    .badge-suspendido { background: #ffe0e0; color: #e63939; }
    .badge-verificado { background: #d4edda; color: #2d6a4f; }
    .badge-pendiente { background: #fff3cd; color: #856404; }
    .badge-gratis { background: #e8f4fd; color: #1a6fa8; }
    .badge-mensual { background: #f0e8fd; color: #6a1a8f; }
    .badge-anual { background: #fde8f0; color: #8f1a4a; }
    .badge-vencido { background: #ffe0e0; color: #e63939; }

    .acciones { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.8; }
    .btn-verificar { background: #f0f0f0; color: #555; }
    .btn-verificar.on { background: #2d6a4f; color: #fff; }
    .btn-suspender { background: #fff3cd; color: #856404; }
    .btn-suspender.on { background: #ffe0e0; color: #e63939; }
    .btn-borrar { background: #ffe0e0; color: #e63939; }

    .loading { text-align: center; padding: 60px; color: #888; font-size: 15px; }
    .sin-datos { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

    .visitas-bar { display: flex; align-items: center; gap: 6px; }
    .bar-bg { flex: 1; height: 5px; background: #f0f0f0; border-radius: 3px; overflow: hidden; min-width: 40px; }
    .bar-fill { height: 100%; background: #2a9d8f; border-radius: 3px; }

    /* Modal confirmación borrar */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .overlay.visible { display: flex; }
    .modal { background: #fff; border-radius: 20px; padding: 32px; max-width: 360px; width: 90%; text-align: center; }
    .modal h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 12px; }
    .modal p { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-cancelar { background: #f0f0f0; color: #555; }
    .btn-confirmar { background: #e63939; color: #fff; }
  </style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-circle"><div class="logo-pin"></div></div></div>
  <h1>Del Barrio <span>Admin</span></h1>
</header>

<div class="stats">
  <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total registrados</div></div>
  <div class="stat"><div class="stat-num" id="stat-gratis">—</div><div class="stat-label">En período gratis</div></div>
  <div class="stat"><div class="stat-num" id="stat-mensual">—</div><div class="stat-label">Plan mensual</div></div>
  <div class="stat"><div class="stat-num" id="stat-anual">—</div><div class="stat-label">Plan anual</div></div>
  <div class="stat"><div class="stat-num" id="stat-verificados">—</div><div class="stat-label">Verificados</div></div>
  <div class="stat"><div class="stat-num" id="stat-suspendidos">—</div><div class="stat-label">Suspendidos</div></div>
</div>

<div class="controles">
  <button class="tab activo" onclick="setTab('todos', event)">Todos</button>
  <button class="tab" onclick="setTab('gratis', event)">🆓 Período gratis</button>
  <button class="tab" onclick="setTab('mensual', event)">📅 Plan mensual</button>
  <button class="tab" onclick="setTab('anual', event)">📆 Plan anual</button>
  <button class="tab" onclick="setTab('verificados', event)">✓ Verificados</button>
  <button class="tab" onclick="setTab('suspendidos', event)">🚫 Suspendidos</button>
</div>

<div class="tabla-wrap">
  <table>
    <thead>
      <tr>
        <th>Local</th>
        <th>Categoría</th>
        <th>Visitas</th>
        <th>Plan</th>
        <th>Verificado</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="7" class="loading">Cargando...</td></tr>
    </tbody>
  </table>
</div>

<!-- Modal borrar -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>⚠️ Borrar local</h2>
    <p id="modal-texto">¿Estás seguro que querés borrar este local? Esta acción no se puede deshacer.</p>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirmar" onclick="confirmarBorrar()">Borrar</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dlvtgrjmeyuxgojryafr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_R2C9F9NOjCNx765jp90DbA_hr70zqPT';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const ADMIN_PASS = 'Perlita92@';

  function checkAuth() {
    if (sessionStorage.getItem('admin_ok') !== '1') {
      const pass = prompt('🔒 Contraseña de administrador:');
      if (pass !== ADMIN_PASS) {
        document.body.innerHTML = '<div style="text-align:center;padding:80px;font-size:18px;color:#e63939;">Acceso denegado.</div>';
        return false;
      }
      sessionStorage.setItem('admin_ok', '1');
    }
    return true;
  }

  if (!checkAuth()) { throw new Error('No autorizado'); }

  let locales = [];
  let tabActual = 'todos';
  let maxVisitas = 1;
  let idParaBorrar = null;

  function getPlan(l) {
    const ahora = new Date();
    if (l.payment_id) {
      // Tiene pago — determinar si mensual o anual por activated_at
      // Por simplicidad usamos el campo plan si existe, sino mensual
      return l.plan || 'mensual';
    }
    if (l.free_until && new Date(l.free_until) > ahora) return 'gratis';
    return 'vencido';
  }

  async function cargar() {
    const { data, error } = await db.from('locales').select('*').order('created_at', { ascending: false });
    if (error) {
      document.getElementById('tbody').innerHTML = '<tr><td colspan="7" class="sin-datos">Error al cargar datos</td></tr>';
      return;
    }
    locales = data || [];
    maxVisitas = Math.max(1, ...locales.map(l => l.visitas || 0));
    actualizarStats();
    renderTabla();
  }

  function actualizarStats() {
    const ahora = new Date();
    document.getElementById('stat-total').textContent = locales.length;
    document.getElementById('stat-gratis').textContent = locales.filter(l => !l.payment_id && l.free_until && new Date(l.free_until) > ahora).length;
    document.getElementById('stat-mensual').textContent = locales.filter(l => l.payment_id && (!l.plan || l.plan === 'mensual')).length;
    document.getElementById('stat-anual').textContent = locales.filter(l => l.payment_id && l.plan === 'anual').length;
    document.getElementById('stat-verificados').textContent = locales.filter(l => l.verificado).length;
    document.getElementById('stat-suspendidos').textContent = locales.filter(l => l.suspendido).length;
  }

  function setTab(tab, event) {
    tabActual = tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('activo'));
    event.target.classList.add('activo');
    renderTabla();
  }

  function renderTabla() {
    const ahora = new Date();
    let filtrados = locales;

    if (tabActual === 'gratis') filtrados = locales.filter(l => !l.payment_id && l.free_until && new Date(l.free_until) > ahora);
    if (tabActual === 'mensual') filtrados = locales.filter(l => l.payment_id && (!l.plan || l.plan === 'mensual'));
    if (tabActual === 'anual') filtrados = locales.filter(l => l.payment_id && l.plan === 'anual');
    if (tabActual === 'verificados') filtrados = locales.filter(l => l.verificado);
    if (tabActual === 'suspendidos') filtrados = locales.filter(l => l.suspendido);

    if (filtrados.length === 0) {
      document.getElementById('tbody').innerHTML = '<tr><td colspan="7" class="sin-datos">No hay locales en esta categoría</td></tr>';
      return;
    }

    document.getElementById('tbody').innerHTML = filtrados.map(l => {
      const cats = Array.isArray(l.categoria) ? l.categoria.join(' · ') : (l.categoria || '—');
      const visitas = l.visitas || 0;
      const pct = Math.round((visitas / maxVisitas) * 100);
      const plan = getPlan(l);

      const planBadge = {
        gratis: '<span class="badge badge-gratis">🆓 Gratis</span>',
        mensual: '<span class="badge badge-mensual">📅 Mensual</span>',
        anual: '<span class="badge badge-anual">📆 Anual</span>',
        vencido: '<span class="badge badge-vencido">❌ Vencido</span>',
      }[plan] || '—';

      const estadoBadge = l.suspendido
        ? '<span class="badge badge-suspendido">🚫 Suspendido</span>'
        : l.activo
          ? '<span class="badge badge-activo">Activo</span>'
          : '<span class="badge badge-inactivo">Inactivo</span>';

      return `
        <tr>
          <td><strong>${l.nombre || '—'}</strong><br><small style="color:#aaa">${l.direccion || ''}</small></td>
          <td>${cats}</td>
          <td>
            <div class="visitas-bar">
              <span style="min-width:24px;font-weight:600;">${visitas}</span>
              <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
            </div>
          </td>
          <td>${planBadge}</td>
          <td>
            <button class="btn btn-verificar ${l.verificado ? 'on' : ''}" onclick="toggleVerificado('${l.id}', ${l.verificado})">
              ${l.verificado ? '✓ Verificado' : 'Pendiente'}
            </button>
          </td>
          <td>${estadoBadge}</td>
          <td>
            <div class="acciones">
              <button class="btn btn-suspender ${l.suspendido ? 'on' : ''}" onclick="toggleSuspendido('${l.id}', ${l.suspendido})">
                ${l.suspendido ? '↩ Reactivar' : '🚫 Suspender'}
              </button>
              <button class="btn btn-borrar" onclick="abrirModal('${l.id}', '${(l.nombre || '').replace(/'/g, "\\'")}')">
                🗑 Borrar
              </button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  async function toggleVerificado(id, actual) {
    const { error } = await db.from('locales').update({ verificado: !actual }).eq('id', id);
    if (!error) { locales = locales.map(l => l.id === id ? { ...l, verificado: !actual } : l); actualizarStats(); renderTabla(); }
  }

  async function toggleSuspendido(id, actual) {
    const nuevo = !actual;
    const { error } = await db.from('locales').update({ suspendido: nuevo, activo: !nuevo }).eq('id', id);
    if (!error) { locales = locales.map(l => l.id === id ? { ...l, suspendido: nuevo, activo: !nuevo } : l); actualizarStats(); renderTabla(); }
  }

  function abrirModal(id, nombre) {
    idParaBorrar = id;
    document.getElementById('modal-texto').textContent = `¿Estás seguro que querés borrar "${nombre}"? Esta acción no se puede deshacer.`;
    document.getElementById('overlay').classList.add('visible');
  }

  function cerrarModal() {
    idParaBorrar = null;
    document.getElementById('overlay').classList.remove('visible');
  }

  async function confirmarBorrar() {
    if (!idParaBorrar) return;
    const { error } = await db.from('locales').delete().eq('id', idParaBorrar);
    if (!error) { locales = locales.filter(l => l.id !== idParaBorrar); actualizarStats(); renderTabla(); }
    cerrarModal();
  }

  cargar();
</script>
</body>
</html>
