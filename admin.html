<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Del Barrio — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 36px; height: 36px;
      background: #2a9d8f;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-circle {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-pin { width: 6px; height: 6px; border-radius: 50%; background: #fff; }
    header h1 { font-size: 18px; font-weight: 700; }
    header span { font-size: 13px; color: #aaa; margin-left: 4px; }

    .stats {
      display: flex;
      gap: 16px;
      padding: 24px;
      flex-wrap: wrap;
    }
    .stat {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      flex: 1;
      min-width: 130px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-num { font-size: 30px; font-weight: 800; color: #1a1a2e; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

    .controles {
      padding: 0 24px 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tab {
      padding: 10px 20px;
      border-radius: 20px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #888;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      transition: all 0.15s;
    }
    .tab.activo { background: #1a1a2e; color: #fff; }

    .search-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border-radius: 20px;
      padding: 8px 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .search-wrap input {
      border: none;
      outline: none;
      font-size: 14px;
      color: #1a1a2e;
      width: 140px;
      background: transparent;
    }
    .search-wrap input::placeholder { color: #bbb; }
    .search-wrap button {
      border: none;
      background: none;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      color: #888;
    }
    .search-wrap button:hover { color: #1a1a2e; }

    .search-resultado {
      padding: 0 24px 12px;
      font-size: 13px;
      color: #888;
      font-style: italic;
    }

    .tabla-wrap { padding: 0 24px 40px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); min-width: 1000px; }
    th { background: #f8f8f8; padding: 14px 16px; text-align: left; font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 12px 16px; font-size: 13px; color: #333; border-top: 1px solid #f0f0f0; vertical-align: middle; }
    tr:hover td { background: #fafafa; }
    tr.highlight td { background: #f0faf9; }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-activo { background: #d0f0ec; color: #2a9d8f; }
    .badge-inactivo { background: #f0f0f0; color: #888; }
    .badge-suspendido { background: #ffe0e0; color: #e63939; }
    .badge-gratis { background: #e8f4fd; color: #1a6fa8; }
    .badge-mensual { background: #f0e8fd; color: #6a1a8f; }
    .badge-anual { background: #fde8f0; color: #8f1a4a; }
    .badge-vencido { background: #ffe0e0; color: #e63939; }
    .badge-id { background: #f0f0f0; color: #555; font-family: monospace; font-size: 12px; }

    .acciones { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.8; }
    .btn-verificar { background: #f0f0f0; color: #555; }
    .btn-verificar.on { background: #2d6a4f; color: #fff; }
    .btn-suspender { background: #fff3cd; color: #856404; }
    .btn-suspender.on { background: #ffe0e0; color: #e63939; }
    .btn-borrar { background: #ffe0e0; color: #e63939; }
    .btn-extender { background: #e8f4fd; color: #1a6fa8; }
    .btn-plan-mensual { background: #f0e8fd; color: #6a1a8f; }
    .btn-plan-anual { background: #fde8f0; color: #8f1a4a; }

    .loading { text-align: center; padding: 60px; color: #888; font-size: 15px; }
    .sin-datos { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

    .visitas-bar { display: flex; align-items: center; gap: 6px; }
    .bar-bg { flex: 1; height: 5px; background: #f0f0f0; border-radius: 3px; overflow: hidden; min-width: 40px; }
    .bar-fill { height: 100%; background: #2a9d8f; border-radius: 3px; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .overlay.visible { display: flex; }
    .modal { background: #fff; border-radius: 20px; padding: 32px; max-width: 360px; width: 90%; text-align: center; }
    .modal h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 12px; }
    .modal p { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-cancelar { background: #f0f0f0; color: #555; }
    .btn-confirmar { background: #e63939; color: #fff; }

    .modal-plan-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .btn-plan-opcion {
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-plan-opcion:hover { opacity: 0.85; }
    .btn-plan-opcion.mensual { background: #f0e8fd; color: #6a1a8f; }
    .btn-plan-opcion.anual { background: #fde8f0; color: #8f1a4a; }
  </style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-circle"><div class="logo-pin"></div></div></div>
  <h1>Del Barrio <span>Admin</span></h1>
</header>

<div class="stats">
  <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total registrados</div></div>
  <div class="stat"><div class="stat-num" id="stat-gratis">—</div><div class="stat-label">En período gratis</div></div>
  <div class="stat"><div class="stat-num" id="stat-mensual">—</div><div class="stat-label">Plan mensual</div></div>
  <div class="stat"><div class="stat-num" id="stat-anual">—</div><div class="stat-label">Plan anual</div></div>
  <div class="stat"><div class="stat-num" id="stat-verificados">—</div><div class="stat-label">Verificados</div></div>
  <div class="stat"><div class="stat-num" id="stat-suspendidos">—</div><div class="stat-label">Suspendidos</div></div>
</div>

<div class="controles">
  <button class="tab activo" onclick="setTab('todos', event)">Todos</button>
  <button class="tab" onclick="setTab('gratis', event)">🆓 Período gratis</button>
  <button class="tab" onclick="setTab('mensual', event)">📅 Plan mensual</button>
  <button class="tab" onclick="setTab('anual', event)">📆 Plan anual</button>
  <button class="tab" onclick="setTab('verificados', event)">✓ Verificados</button>
  <button class="tab" onclick="setTab('suspendidos', event)">🚫 Suspendidos</button>

  <div class="search-wrap">
    <span>🔍</span>
    <input
      type="number"
      id="search-id"
      placeholder="Buscar por ID..."
      oninput="buscarPorId()"
      min="1"
    />
    <button onclick="limpiarBusqueda()" title="Limpiar">✕</button>
  </div>
</div>

<div class="search-resultado" id="search-resultado" style="display:none"></div>

<div class="tabla-wrap">
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Local</th>
        <th>Categoría</th>
        <th>Visitas</th>
        <th>Plan</th>
        <th>Verificado</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="8" class="loading">Cargando...</td></tr>
    </tbody>
  </table>
</div>

<!-- Modal borrar -->
<div class="overlay" id="overlay-borrar">
  <div class="modal">
    <h2>⚠️ Borrar local</h2>
    <p id="modal-borrar-texto"></p>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal('borrar')">Cancelar</button>
      <button class="btn-confirmar" onclick="confirmarBorrar()">Borrar</button>
    </div>
  </div>
</div>

<!-- Modal extender promo -->
<div class="overlay" id="overlay-extender">
  <div class="modal">
    <h2>📅 Extender período</h2>
    <p id="modal-extender-texto"></p>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal('extender')">Cancelar</button>
      <button class="btn-confirmar" style="background:#1a6fa8;" onclick="confirmarExtender()">+30 días</button>
    </div>
  </div>
</div>

<!-- Modal activar plan -->
<div class="overlay" id="overlay-plan">
  <div class="modal">
    <h2>💳 Activar plan</h2>
    <p id="modal-plan-texto"></p>
    <div class="modal-plan-btns">
      <button class="btn-plan-opcion mensual" onclick="confirmarPlan('mensual')">📅 Plan mensual</button>
      <button class="btn-plan-opcion anual" onclick="confirmarPlan('anual')">📆 Plan anual</button>
    </div>
    <button class="btn-cancelar" style="width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;" onclick="cerrarModal('plan')">Cancelar</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dlvtgrjmeyuxgojryafr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_R2C9F9NOjCNx765jp90DbA_hr70zqPT';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const ADMIN_PASS = 'Perlita92@';

  function checkAuth() {
    if (sessionStorage.getItem('admin_ok') !== '1') {
      const pass = prompt('🔒 Contraseña de administrador:');
      if (pass !== ADMIN_PASS) {
        document.body.innerHTML = '<div style="text-align:center;padding:80px;font-size:18px;color:#e63939;">Acceso denegado.</div>';
        return false;
      }
      sessionStorage.setItem('admin_ok', '1');
    }
    return true;
  }

  if (!checkAuth()) { throw new Error('No autorizado'); }

  let locales = [];
  let tabActual = 'todos';
  let maxVisitas = 1;
  let idParaBorrar = null;
  let idParaExtender = null;
  let idParaPlan = null;
  let busquedaId = '';

  function getPlan(l) {
    const ahora = new Date();
    if (l.payment_id) return l.plan || 'mensual';
    if (l.free_until && new Date(l.free_until) > ahora) return 'gratis';
    return 'vencido';
  }

  async function cargar() {
    const { data, error } = await db.from('locales').select('*').order('local_id', { ascending: true });
    if (error) {
      document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="sin-datos">Error al cargar datos</td></tr>';
      return;
    }
    locales = data || [];

    // Traer emails de profiles
    const ownerIds = locales.map(l => l.owner_id).filter(Boolean);
    const { data: profiles } = await db.from('profiles').select('id, full_name').in('id', ownerIds);
    const emailMap = {};
    if (profiles) profiles.forEach(p => emailMap[p.id] = p.full_name);
    locales = locales.map(l => ({ ...l, email: emailMap[l.owner_id] || '—' }));

    maxVisitas = Math.max(1, ...locales.map(l => l.visitas || 0));
    actualizarStats();
    renderTabla();
  }

  function actualizarStats() {
    const ahora = new Date();
    document.getElementById('stat-total').textContent = locales.length;
    document.getElementById('stat-gratis').textContent = locales.filter(l => !l.payment_id && l.free_until && new Date(l.free_until) > ahora).length;
    document.getElementById('stat-mensual').textContent = locales.filter(l => l.payment_id && (!l.plan || l.plan === 'mensual')).length;
    document.getElementById('stat-anual').textContent = locales.filter(l => l.payment_id && l.plan === 'anual').length;
    document.getElementById('stat-verificados').textContent = locales.filter(l => l.verificado).length;
    document.getElementById('stat-suspendidos').textContent = locales.filter(l => l.suspendido).length;
  }

  function setTab(tab, event) {
    tabActual = tab;
    limpiarBusqueda();
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('activo'));
    event.target.classList.add('activo');
    renderTabla();
  }

  function buscarPorId() {
    busquedaId = document.getElementById('search-id').value.trim();
    renderTabla();
  }

  function limpiarBusqueda() {
    busquedaId = '';
    document.getElementById('search-id').value = '';
    document.getElementById('search-resultado').style.display = 'none';
    renderTabla();
  }

  function cerrarModal(tipo) {
    document.getElementById(`overlay-${tipo}`).classList.remove('visible');
    if (tipo === 'borrar') idParaBorrar = null;
    if (tipo === 'extender') idParaExtender = null;
    if (tipo === 'plan') idParaPlan = null;
  }

  function renderTabla() {
    const ahora = new Date();
    let filtrados = locales;

    if (busquedaId !== '') {
      const idNum = parseInt(busquedaId);
      filtrados = locales.filter(l => l.local_id === idNum);
      const res = document.getElementById('search-resultado');
      res.textContent = filtrados.length === 0
        ? `No se encontró ningún local con ID #${idNum}`
        : `Resultado para ID #${idNum}: ${filtrados[0].nombre}`;
      res.style.display = 'block';
    } else {
      document.getElementById('search-resultado').style.display = 'none';
      if (tabActual === 'gratis') filtrados = locales.filter(l => !l.payment_id && l.free_until && new Date(l.free_until) > ahora);
      if (tabActual === 'mensual') filtrados = locales.filter(l => l.payment_id && (!l.plan || l.plan === 'mensual'));
      if (tabActual === 'anual') filtrados = locales.filter(l => l.payment_id && l.plan === 'anual');
      if (tabActual === 'verificados') filtrados = locales.filter(l => l.verificado);
      if (tabActual === 'suspendidos') filtrados = locales.filter(l => l.suspendido);
    }

    if (filtrados.length === 0) {
      document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="sin-datos">No hay locales en esta categoría</td></tr>';
      return;
    }

    document.getElementById('tbody').innerHTML = filtrados.map(l => {
      const cats = Array.isArray(l.categoria) ? l.categoria.join(' · ') : (l.categoria || '—');
      const visitas = l.visitas || 0;
      const pct = Math.round((visitas / maxVisitas) * 100);
      const plan = getPlan(l);
      const esResultadoBusqueda = busquedaId !== '';

      const planBadge = {
        gratis: '<span class="badge badge-gratis">🆓 Gratis</span>',
        mensual: '<span class="badge badge-mensual">📅 Mensual</span>',
        anual: '<span class="badge badge-anual">📆 Anual</span>',
        vencido: '<span class="badge badge-vencido">❌ Vencido</span>',
      }[plan] || '—';

      const estadoBadge = l.suspendido
        ? '<span class="badge badge-suspendido">🚫 Suspendido</span>'
        : l.activo
          ? '<span class="badge badge-activo">Activo</span>'
          : '<span class="badge badge-inactivo">Inactivo</span>';

      const nombreEscapado = (l.nombre || '').replace(/'/g, "\\'");

      return `
        <tr class="${esResultadoBusqueda ? 'highlight' : ''}">
          <td><span class="badge badge-id">#${l.local_id || '—'}</span></td>
          <td>
            <strong>${l.nombre || '—'}</strong><br>
            <small style="color:#aaa">${l.direccion || ''}</small><br>
            <small style="color:#2a9d8f">${l.email}</small>
          </td>
          <td>${cats}</td>
          <td>
            <div class="visitas-bar">
              <span style="min-width:24px;font-weight:600;">${visitas}</span>
              <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
            </div>
          </td>
          <td>${planBadge}</td>
          <td>
            <button class="btn btn-verificar ${l.verificado ? 'on' : ''}" onclick="toggleVerificado('${l.id}', ${l.verificado})">
              ${l.verificado ? '✓ Verificado' : 'Pendiente'}
            </button>
          </td>
          <td>${estadoBadge}</td>
          <td>
            <div class="acciones">
              <button class="btn btn-extender" onclick="abrirExtender('${l.id}', '${nombreEscapado}', '${l.free_until || ''}')">
                +30 días
              </button>
              <button class="btn btn-plan-mensual" onclick="abrirPlan('${l.id}', '${nombreEscapado}')">
                💳 Plan
              </button>
              <button class="btn btn-suspender ${l.suspendido ? 'on' : ''}" onclick="toggleSuspendido('${l.id}', ${l.suspendido})">
                ${l.suspendido ? '↩ Reactivar' : '🚫 Suspender'}
              </button>
              <button class="btn btn-borrar" onclick="abrirBorrar('${l.id}', '${nombreEscapado}')">
                🗑 Borrar
              </button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  const ADMIN_ACTION_URL = 'https://dlvtgrjmeyuxgojryafr.supabase.co/functions/v1/admin-action';

  async function adminAction(action, id, data = {}) {
    const res = await fetch(ADMIN_ACTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: ADMIN_PASS, action, id, data })
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Error');
    return json;
  }

  async function toggleVerificado(id, actual) {
    try {
      await adminAction('verificar', id, { verificado: !actual });
      locales = locales.map(l => l.id === id ? { ...l, verificado: !actual } : l);
      actualizarStats(); renderTabla();
    } catch(e) { alert('Error: ' + e.message); }
  }

  async function toggleSuspendido(id, actual) {
    const nuevo = !actual;
    try {
      await adminAction(nuevo ? 'suspender' : 'reactivar', id);
      locales = locales.map(l => l.id === id ? { ...l, suspendido: nuevo, activo: !nuevo } : l);
      actualizarStats(); renderTabla();
    } catch(e) { alert('Error: ' + e.message); }
  }

  function abrirBorrar(id, nombre) {
    idParaBorrar = id;
    document.getElementById('modal-borrar-texto').textContent = `¿Estás seguro que querés borrar "${nombre}"? Esta acción no se puede deshacer.`;
    document.getElementById('overlay-borrar').classList.add('visible');
  }

  async function confirmarBorrar() {
    if (!idParaBorrar) return;
    try {
      await adminAction('borrar', idParaBorrar);
      locales = locales.filter(l => l.id !== idParaBorrar);
      actualizarStats(); renderTabla();
    } catch(e) { alert('Error: ' + e.message); }
    cerrarModal('borrar');
  }

  function abrirExtender(id, nombre, freeUntil) {
    idParaExtender = id;
    const base = freeUntil && new Date(freeUntil) > new Date() ? new Date(freeUntil) : new Date();
    const nueva = new Date(base);
    nueva.setDate(nueva.getDate() + 30);
    const fechaStr = nueva.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    document.getElementById('modal-extender-texto').textContent = `Extender el período gratis de "${nombre}" por 30 días más. Nuevo vencimiento: ${fechaStr}.`;
    document.getElementById('overlay-extender').classList.add('visible');
  }

  async function confirmarExtender() {
    if (!idParaExtender) return;
    const local = locales.find(l => l.id === idParaExtender);
    const base = local?.free_until && new Date(local.free_until) > new Date() ? new Date(local.free_until) : new Date();
    const nueva = new Date(base);
    nueva.setDate(nueva.getDate() + 30);
    try {
      const { error } = await db.from('locales').update({
        free_until: nueva.toISOString(),
        activo: true,
      }).eq('id', idParaExtender);
      if (error) throw error;
      locales = locales.map(l => l.id === idParaExtender ? { ...l, free_until: nueva.toISOString(), activo: true } : l);
      actualizarStats(); renderTabla();
      alert('✅ Período extendido correctamente');
    } catch(e) { alert('Error: ' + e.message); }
    cerrarModal('extender');
  }

  function abrirPlan(id, nombre) {
    idParaPlan = id;
    document.getElementById('modal-plan-texto').textContent = `Elegí el plan a activar para "${nombre}":`;
    document.getElementById('overlay-plan').classList.add('visible');
  }

  async function confirmarPlan(tipoPlan) {
    if (!idParaPlan) return;
    try {
      const { error } = await db.from('locales').update({
        plan: tipoPlan,
        payment_id: `manual_${Date.now()}`,
        activo: true,
        suspendido: false,
      }).eq('id', idParaPlan);
      if (error) throw error;
      locales = locales.map(l => l.id === idParaPlan
        ? { ...l, plan: tipoPlan, payment_id: `manual_${Date.now()}`, activo: true, suspendido: false }
        : l
      );
      actualizarStats(); renderTabla();
      alert(`✅ Plan ${tipoPlan} activado correctamente`);
    } catch(e) { alert('Error: ' + e.message); }
    cerrarModal('plan');
  }

  cargar();
</script>
